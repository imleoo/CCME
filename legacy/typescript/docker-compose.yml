version: '3.8'

services:
  # Layer 1: Mid-term storage (Redis + RediSearch)
  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: ccme-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-stack-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ccme_network

  # Layer 2: Long-term storage (PostgreSQL + pgvector)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ccme-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-chronocascade}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-chronocascade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ccme_network

  # Application Service (CCME)
  app:
    build: .
    container_name: ccme-app
    depends_on:
      redis-stack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis-stack:6379
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DATABASE: ${PG_DATABASE:-chronocascade}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - ccme_network

volumes:
  redis_data:
  pg_data:

networks:
  ccme_network:
    driver: bridge
